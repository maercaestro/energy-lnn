run_name: default

experiment:
  seeds: [42, 123, 456]
  models: [lnn, lstm, mlp]
  device: auto

data:
  real_csv: ../dataset/real_furnace_eblnn.csv
  edge_csv: ../dataset/edge_cases_v2_eblnn.csv
  seq_len: 30
  stride: 30
  batch_size: 64
  test_size: 0.2
  val_size: 0.1
  edge_fraction: 1.0
  scenarios: null
  confidence_filter: null

training:
  epochs: 200
  learning_rate: 0.001
  patience: 20
  min_delta: 0.0001
  early_stopping: true

models:
  lnn:
    hidden_size: 128
    mixed_memory: true
  lstm:
    hidden_size: 128
    num_layers: 2
    dropout: 0.1
  mlp:
    hidden_dims: [128, 64]
    dropout: 0.1
